<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Real 360 Stitching</title>

<script async src="https://docs.opencv.org/4.x/opencv.js"></script>

<style>
body {
    margin:0;
    background:#111;
    color:white;
    text-align:center;
    font-family:Arial;
}
video, canvas {
    width:100%;
    max-height:50vh;
}
button {
    margin:5px;
    padding:10px;
}
</style>
</head>

<body>

<h2>🌐 Real 360 Stitching (Cylindrical)</h2>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<div>
    <button onclick="startCamera()">Start</button>
    <button onclick="capture()">Capture</button>
    <button onclick="process()">Build 360</button>
    <button onclick="exportJPG()">Export</button>
</div>

<script>
let video = document.getElementById("video");
let canvas = document.getElementById("canvas");
let ctx = canvas.getContext("2d");

let frames = [];
let panorama = null;

// 📸 Camera
async function startCamera(){
    let stream = await navigator.mediaDevices.getUserMedia({
        video:{facingMode:"environment"},
        audio:false
    });
    video.srcObject = stream;
}

// 📸 Capture
function capture(){
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    ctx.drawImage(video,0,0);

    let img = new Image();
    img.src = canvas.toDataURL("image/jpeg");
    frames.push(img);

    alert("Captured: " + frames.length);
}

// 🌀 Cylindrical Projection
function cylindricalWarp(src){
    let dst = new cv.Mat.zeros(src.rows, src.cols, src.type());

    let f = src.cols; // focal length approx

    for(let y=0;y<src.rows;y++){
        for(let x=0;x<src.cols;x++){

            let theta = (x - src.cols/2)/f;
            let h = (y - src.rows/2)/f;

            let X = Math.sin(theta);
            let Y = h;
            let Z = Math.cos(theta);

            let x2 = Math.round(f * X/Z + src.cols/2);
            let y2 = Math.round(f * Y/Z + src.rows/2);

            if(x2>=0 && x2<src.cols && y2>=0 && y2<src.rows){
                dst.ucharPtr(y,x)[0] = src.ucharPtr(y2,x2)[0];
                dst.ucharPtr(y,x)[1] = src.ucharPtr(y2,x2)[1];
                dst.ucharPtr(y,x)[2] = src.ucharPtr(y2,x2)[2];
            }
        }
    }
    return dst;
}

// 🧩 Main process
function process(){
    if(frames.length < 3){
        alert("Capture more images");
        return;
    }

    let base = cv.imread(frames[0]);
    base = cylindricalWarp(base);

    for(let i=1;i<frames.length;i++){

        let next = cv.imread(frames[i]);
        next = cylindricalWarp(next);

        let gray1 = new cv.Mat();
        let gray2 = new cv.Mat();

        cv.cvtColor(base, gray1, cv.COLOR_RGBA2GRAY);
        cv.cvtColor(next, gray2, cv.COLOR_RGBA2GRAY);

        let orb = new cv.ORB();

        let kp1 = new cv.KeyPointVector();
        let kp2 = new cv.KeyPointVector();
        let des1 = new cv.Mat();
        let des2 = new cv.Mat();

        orb.detectAndCompute(gray1,new cv.Mat(),kp1,des1);
        orb.detectAndCompute(gray2,new cv.Mat(),kp2,des2);

        let bf = new cv.BFMatcher(cv.NORM_HAMMING,true);
        let matches = new cv.DMatchVector();
        bf.match(des1,des2,matches);

        let srcPts=[], dstPts=[];

        for(let j=0;j<matches.size();j++){
            let m = matches.get(j);
            let p1 = kp1.get(m.queryIdx).pt;
            let p2 = kp2.get(m.trainIdx).pt;

            srcPts.push(p1.x,p1.y);
            dstPts.push(p2.x,p2.y);
        }

        let srcMat = cv.matFromArray(matches.size(),1,cv.CV_32FC2,srcPts);
        let dstMat = cv.matFromArray(matches.size(),1,cv.CV_32FC2,dstPts);

        let H = cv.findHomography(dstMat, srcMat, cv.RANSAC);

        let result = new cv.Mat();
        let dsize = new cv.Size(base.cols + next.cols, base.rows);

        cv.warpPerspective(next, result, H, dsize);

        let roi = result.roi(new cv.Rect(0,0,base.cols,base.rows));
        base.copyTo(roi);

        base = result;
    }

    cv.imshow("canvas", base);

    // force 2:1 ratio
    let out = document.createElement("canvas");
    out.width = base.rows * 2;
    out.height = base.rows;

    let octx = out.getContext("2d");
    octx.drawImage(canvas,0,0,out.width,out.height);

    panorama = out.toDataURL("image/jpeg",0.95);

    alert("Real 360 ready!");
}

// 💾 Export
function exportJPG(){
    if(!panorama){
        alert("Build first");
        return;
    }

    let a = document.createElement("a");
    a.href = panorama;
    a.download = "real360.jpg";
    a.click();
}
</script>

</body>
</html>
