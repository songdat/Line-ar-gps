<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AR Navigation Arrow</title>

<style>
body {
  margin:0;
  overflow:hidden;
  background:black;
}

video {
  position:fixed;
  width:100%;
  height:100%;
  object-fit:cover;
}

/* AR ARROW */
#arrow {
  position:fixed;
  bottom:80px;
  left:50%;
  width:6px;
  height:120px;
  background:red;
  transform-origin: center bottom;
  transform: translateX(-50%) rotate(0deg);
}

/* Arrow head */
#arrow::after {
  content:'';
  position:absolute;
  top:-15px;
  left:50%;
  transform:translateX(-50%);
  border-left:10px solid transparent;
  border-right:10px solid transparent;
  border-bottom:15px solid red;
}
</style>
</head>

<body>

<video id="camera" autoplay playsinline></video>
<div id="arrow"></div>

<script>
const video = document.getElementById("camera");
const arrow = document.getElementById("arrow");

// ===== TARGET LOCATION =====
const targetLat = 17.167;
const targetLon = 104.147;

// ===== CAMERA =====
navigator.mediaDevices.getUserMedia({
  video: { facingMode: "environment" }
}).then(stream => video.srcObject = stream);

// ===== GPS =====
let userLat = 0;
let userLon = 0;

navigator.geolocation.watchPosition(pos => {
  userLat = pos.coords.latitude;
  userLon = pos.coords.longitude;
});

// ===== MATH =====
function toRad(d){ return d * Math.PI/180; }
function toDeg(r){ return r * 180/Math.PI; }

function getBearing(lat1, lon1, lat2, lon2){
  let φ1 = toRad(lat1);
  let φ2 = toRad(lat2);
  let Δλ = toRad(lon2 - lon1);

  let y = Math.sin(Δλ) * Math.cos(φ2);
  let x = Math.cos(φ1)*Math.sin(φ2) -
          Math.sin(φ1)*Math.cos(φ2)*Math.cos(Δλ);

  let θ = Math.atan2(y, x);
  return (toDeg(θ) + 360) % 360;
}

// ===== ORIENTATION =====
window.addEventListener("deviceorientationabsolute", (event) => {
  let compass = event.alpha;

  if(userLat && userLon && compass != null){
    let bearing = getBearing(userLat, userLon, targetLat, targetLon);

    let angle = bearing - compass;

    arrow.style.transform =
      `translateX(-50%) rotate(${angle}deg)`;
  }
});
</script>

</body>
</html>
