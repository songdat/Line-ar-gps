<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AR Navigation Demo</title>

<style>
body {
  margin:0;
  overflow:hidden;
  font-family:Arial;
  color:white;
}

/* CAMERA */
video {
  position:fixed;
  width:100%;
  height:100%;
  object-fit:cover;
}

/* AR ARROW */
#arrow {
  position:fixed;
  bottom:80px;
  left:50%;
  width:6px;
  height:120px;
  background:red;
  transform-origin: center bottom;
  transform: translateX(-50%) rotate(0deg);
}

#arrow::after {
  content:'';
  position:absolute;
  top:-15px;
  left:50%;
  transform:translateX(-50%);
  border-left:10px solid transparent;
  border-right:10px solid transparent;
  border-bottom:15px solid red;
}

/* DISTANCE LABEL */
#info {
  position:fixed;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  background:rgba(0,0,0,0.5);
  padding:10px 20px;
  border-radius:10px;
  font-size:18px;
}

/* BUTTONS */
#controls {
  position:fixed;
  bottom:10px;
  left:50%;
  transform:translateX(-50%);
}

button {
  padding:10px 15px;
  margin:5px;
  font-size:16px;
  border:none;
  border-radius:8px;
}
</style>
</head>

<body>

<video id="camera" autoplay playsinline></video>

<div id="info">Waiting GPS...</div>
<div id="arrow"></div>

<div id="controls">
  <button onclick="randomTarget()">🎯 Random Target</button>
  <button onclick="openMap()">🗺 Open Map</button>
</div>

<script>
const video = document.getElementById("camera");
const arrow = document.getElementById("arrow");
const info = document.getElementById("info");

// ===== CAMERA =====
navigator.mediaDevices.getUserMedia({
  video: { facingMode: "environment" }
}).then(stream => video.srcObject = stream);

// ===== USER LOCATION =====
let userLat = 0;
let userLon = 0;

navigator.geolocation.watchPosition(pos => {
  userLat = pos.coords.latitude;
  userLon = pos.coords.longitude;
});

// ===== TARGET =====
let targetLat = 0;
let targetLon = 0;

// ===== RANDOM TARGET (within ~500m) =====
function randomTarget(){
  if(!userLat) return alert("Waiting GPS...");

  let offsetLat = (Math.random() - 0.5) * 0.005;
  let offsetLon = (Math.random() - 0.5) * 0.005;

  targetLat = userLat + offsetLat;
  targetLon = userLon + offsetLon;

  info.innerHTML = "New random destination set";
}

// ===== OPEN GOOGLE MAP =====
function openMap(){
  if(!targetLat) return;
  let url = `https://www.google.com/maps?q=${targetLat},${targetLon}`;
  window.open(url, "_blank");
}

// ===== MATH =====
function toRad(d){ return d * Math.PI/180; }
function toDeg(r){ return r * 180/Math.PI; }

// Bearing
function getBearing(lat1, lon1, lat2, lon2){
  let φ1 = toRad(lat1);
  let φ2 = toRad(lat2);
  let Δλ = toRad(lon2 - lon1);

  let y = Math.sin(Δλ) * Math.cos(φ2);
  let x = Math.cos(φ1)*Math.sin(φ2) -
          Math.sin(φ1)*Math.cos(φ2)*Math.cos(Δλ);

  let θ = Math.atan2(y, x);
  return (toDeg(θ) + 360) % 360;
}

// Distance (Haversine)
function getDistance(lat1, lon1, lat2, lon2){
  const R = 6371000; // meters
  let dLat = toRad(lat2 - lat1);
  let dLon = toRad(lon2 - lon1);

  let a = Math.sin(dLat/2)**2 +
          Math.cos(toRad(lat1)) *
          Math.cos(toRad(lat2)) *
          Math.sin(dLon/2)**2;

  let c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  return R * c;
}

// ===== ORIENTATION =====
window.addEventListener("deviceorientationabsolute", (event) => {
  let compass = event.alpha;

  if(userLat && targetLat && compass != null){

    let bearing = getBearing(userLat, userLon, targetLat, targetLon);
    let angle = bearing - compass;

    arrow.style.transform =
      `translateX(-50%) rotate(${angle}deg)`;

    // Distance
    let d = getDistance(userLat, userLon, targetLat, targetLon);

    if(d < 1000){
      info.innerHTML = `Distance: ${d.toFixed(0)} m`;
    } else {
      info.innerHTML = `Distance: ${(d/1000).toFixed(2)} km`;
    }
  }
});
</script>

</body>
</html>
